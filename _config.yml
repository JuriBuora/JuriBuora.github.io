title: From Zero to Cybersecurity
email: juribuora@gmail.com
description: >-
  Public learning log documenting my path into cybersecurity through practical
  notes, labs, experiments, mistakes, and lessons learned.

baseurl: "" # the subpath of your site, e.g. /blog
url: "https://juribuora.github.io/" # the base hostname & protocol for your site, e.g. http://example.com
# Social media
twitter_username: JBuora
github_username:  JuriBuora
linkedin_username: Juri-Buora
facebook_username: Juri.Buora



# Fields minima uses, but are not defaulted with the jekyll new command.
# Author is the default for posts, the Atom feed, and is used in the footer.
# Author info
author: Juri Buora  # Your full name


# Navigation menu order
header_pages:
  - Blog/index.md
  - Diagrams-&-Notes/index.md
  - Labs/index.md
  - Reports/index.md
  - Portfolio-Material/index.md
  - about.markdown


# New fields not defaulted by jekyll-new with the minimia theme
# Add a copyright. A copyright symbol and year will be added automatically
# copyright: Company Name, Inc.
copyright: "Juri Buora"


# title-logo is a new field that, when used, displays a logo
# instead of custom text. Ideally, image is 50px high and takes up
# minimal horizontal space. Tested with a new root "images" folder e.g.:
# title-logo: /images/my-logo.png (or JPG, etc.)
title-logo: /assets/images/title-logo.png




# Build settings
# Removed minima theme as it is now a regular theme.
# theme: minima
plugins:
  - jekyll-feed

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md


nav:
  - title: "Blog"
    url: /
  - title: "Tags"
    url: /tags/
